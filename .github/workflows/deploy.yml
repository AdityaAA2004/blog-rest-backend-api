name: Deploy to GCP Cloud Run

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          docker build -t us-central1-docker.pkg.dev/developable-testing/developable/blog-rest-backend-api:latest .
          docker push us-central1-docker.pkg.dev/developable-testing/developable/blog-rest-backend-api:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy blog-rest-backend-api \
            --image us-central1-docker.pkg.dev/developable-testing/developable/blog-rest-backend-api:latest \
            --region us-central1 \
            --platform managed \
            --quiet
